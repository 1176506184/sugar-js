<!DOCTYPE html>
<html lang="en" xmlns:s-use="http://www.w3.org/1999/xhtml" xmlns:s-on="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/packages/sugar/src/css/sugar-css.css">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<style>

    html, body {
        margin: 0;
        padding: 0;
    }

    .title {
        font-size: 23px;
        font-weight: bold;
        line-height: 30px;
        color: #2C2C2C;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .nav {
        width: 100%;
        height: 50px;
        background: #F04142;
        display: flex;
        position: relative;
        top: 0;
        z-index: 999;
    }

    .nav img {
        height: 35px;
    }

    .nav .web_name {
        font-size: 22px;
        font-weight: 400;
        color: #FFFFFF;
        width: calc(40% - 20px);
        padding-left: 20px;
        height: 100%;
        text-align: center;
        display: flex;
        justify-content: left;
        align-items: center;
    }

    .article_body {
        width: 96%;
        margin:0 auto;
        padding-top: 10px;
    }

    .item {
        padding-top: 15px;
        width: 92%;
        margin-left: 4%;
        margin-bottom: 32px;
        display: block;
        position: relative;
    }


    .label_box {
        font-size: 17px;
        font-weight: 400;
        line-height: 25px;
        color: #2C2C2C;
        margin-top: 15px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        font-weight: 400;
        letter-spacing: 1px;
    }


    .image_box{
        width: 92vw;
        height: 48vw;
        position: relative;
    }

    .image_box img{
        width: 100%;
        height: 100%;
    }
</style>
<script src="/dist/sugar.js"></script>
<body>
<div id="app">

    <div class="nav">
        <div class="web_name">
            <img src="//store.44finefood.com/logo/2022-04-27/306EFED3C8A8.png" class="headling_logo">
        </div>
    </div>

    <div class="article_body">
        <div class="title">
            {{state.title}}
        </div>
        <div class="content" s-html="state.content">
        </div>
    </div>

    <div class="article_join">
        <div class="item" s-for="item in list">
            <div class="image_box">
                <img :src="item.cover"/>
            </div>
            <div class="label_box">
                {{item.title}}
            </div>
        </div>
    </div>

    <sugar-dialog :model="active" @close="close">
        <div>

        </div>
    </sugar-dialog>


</div>

</body>

<script>


    const {
        makeSugar,
        reactive,
        reckon,
        onMounted,
        ref,
        createEffect,
        instance,
        watch,
        sugarUI
    } = SUGAR;

    var sugar = makeSugar({
        bulk() {

            const state = reactive({
                name: 0,
                title: '狗狗因為太害怕人類，被安排于兩天后安樂死，幸好她出現了..',
                content: `<p>自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業<span id="vft" data-wordc="231"></span></p><p style="font-weight: 600; color: #CC6633;font-size:15px !important ">
                版權所有，禁止轉載。 違者必究法律責任。
            </p>`
            });

            const list = ref([{
                title: '你要悄悄的變好，然後驚豔所有人：真正厲害的人，會懂得「蘑菇定律」！',
                cover: '//static.rifusy.com/picture/20230206/BE/2BE30778C39Bw1000h525.jpeg'
            }, {
                title: '#耽美 釣系yyds！汪嘰的雅正徹底離家出走了',
                cover: '//static.rifusy.com/picture/20220904/72/4727F87A7A1Fw1000h525.jpeg'
            }]);

            const active = ref(false);

            function close() {
                active.value = false;
            }

            return {
                state,
                active,
                list,
                close
            };
        }
    });

    sugar.install(sugarUI);

    sugar.mount('#app');


</script>
</html>
