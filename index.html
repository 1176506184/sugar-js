<!DOCTYPE html>
<html lang="en" xmlns:s-use="http://www.w3.org/1999/xhtml" xmlns:s-on="http://www.w3.org/1999/xhtml" xmlns="">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/dist/sugar.css">
    <script src="/dist/sugar.js"></script>
    <script src="dist/sugar-ui.js"></script>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<style>

    html, body {
        margin: 0;
        padding: 0;
    }

    .title {
        font-size: 23px;
        font-weight: bold;
        line-height: 30px;
        color: #2C2C2C;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .nav {
        width: 100%;
        height: 50px;
        background: #4faee8;
        display: flex;
        position: relative;
        align-items: center;
        top: 0;
        z-index: 999;
    }

    .nav img {
        height: 35px;
    }

    .nav .web_name {
        font-size: 22px;
        font-weight: 400;
        color: #FFFFFF;
        width: calc(40% - 20px);
        padding-left: 20px;
        height: 100%;
        text-align: center;
        display: flex;
        justify-content: left;
        align-items: center;
    }

    .article_body {
        width: 96%;
        margin: 0 auto;
        padding-top: 10px;
    }

    .item {
        padding-top: 10px;
        width: 92%;
        margin-left: 4%;
        padding-bottom: 10px;
        display: block;
        position: relative;
        border-bottom: 1px solid #eee;
    }


    .label_box {
        font-size: 15px;
        font-weight: 400;
        line-height: 21px;
        color: #2C2C2C;
        margin-top: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        letter-spacing: 1px;
    }


    .image_box {
        width: 92vw;
        height: 48vw;
        position: relative;
        overflow: hidden;
    }

    .image_box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .menu {
        position: absolute;
        right: 10px;
        width: 18px;
    }

    .menu_fixed_box {
        width: 100%;
        top: 0;
        height: 50vh;
        background-color: #fff;
        position: absolute;
        transition: 0.3s;
    }

</style>
<body>
<div id="app" style="width: 100%;height: 200vh;">
    <div s-for="(item,index) in list">
        {{item}}{{index}}
    </div>
    <sugar-dialog :model="show" @close="close">
        <slot #default>
            <div style="width: 100px;height: 100px;background: #FFFFFF">123</div>
        </slot>
    </sugar-dialog>
    <sugar-button @click="open">打开</sugar-button>
    <sugar-back-top></sugar-back-top>
    <sugar-pagination
            :pi="pi"
            :ps="ps"
            :total="total"
            page="2"
            style="margin-top: 10px"
            @change="changePage"
            :btn="true"
            :show-most="true">
    </sugar-pagination>
    <sugar-upload>
        <sugar-button>上传</sugar-button>
    </sugar-upload>
    <div style="margin-top: 100vh">
        <sugar-lazy>
            <div>测试</div>
        </sugar-lazy>
    </div>
</div>
</body>
<script>
    const {
        makeSugar,
        onMounted,
        instance,
        nextTick,
        ref,
        Component,
        reactive,
        watch
    } = SUGAR;
    var sugar = makeSugar({
        bulk() {
            const show = ref(false);
            const dialogRef = instance();
            const list = ref([1, 2, 3, 4]);

            function close() {
                show.value = false;
            }

            function open() {
                show.value = true;
            }

            const pi = ref(1);
            const ps = ref(10);
            const total = ref(100);

            function changePage(e) {
                console.log(pi.value);
                pi.value = e;
            }

            return {
                show,
                close,
                open,
                dialogRef,
                list,
                pi,
                ps,
                total,
                changePage
            };
        }
    });
    sugar.install(sugarUI);
    sugar.mount('#app');
</script>
</html>
