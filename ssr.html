<html lang="">
<head>
    <title></title>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<script src="/dist/sugar.cjs"></script>
<body>
<div id="ssr-root">
    <div>
        <div data-ssr-id="ssr-1" style="font-size:14px">张三</div>
        <div>0</div>
        <div>1</div>
    </div>
</div>
</body>
</html>
<script>
    const {
        makeSugar,
        onMounted,
        ref,
        instance,
        sugarUI,
        useState,
        useEffect,
        nextTick,
        createSSRApp
    } = SUGAR;

    const global = {
        window,
        ssrBulk: {
            'ssr-1': {
                'click': {
                    'value': 'change',
                    'isStatic': false,
                    'modifiers': []
                }
            }
        }
    };

    var root = makeSugar({
        bulk: () => {
            const [state, setState] = useState({
                name: '张三',
                list: [{}, {}],
                fontSize: 14
            });

            function change() {
                setState({
                    ...state.value,
                    fontSize: state.value.fontSize + 1
                });
            }

            return {
                state,
                change,
                setState
            };
        },
        ssr: true,
        ssrRender: function anonymous() {

            with (this) {
                return _c('div', {
                    'attrs': {},
                    'on': {}
                }, [_c('div', {
                    'attrs': {'style': 'font-size:' + state.fontSize + 'px'},
                    'on': {
                        'click': {
                            'value': 'change',
                            'isStatic': false,
                            'modifiers': []
                        }
                    }
                }, [_v(_s(state.name))]), ..._loop((item, index) => {
                    return _c('div', {
                        'attrs': {},
                        'on': {}
                    }, [_v(_s(index))]);
                }, state.list)]);
            }

        },
        ssrVNode: {
            'tag': 'div',
            'data': {
                'attrs': {},
                'on': {}
            },
            'children': [{
                'tag': 'div',
                'data': {
                    'attrs': {'style': 'font-size:14px'},
                    'on': {
                        'click': {
                            'value': 'change',
                            'isStatic': false,
                            'modifiers': []
                        }
                    }
                },
                'children': [{'text': '张三'}]
            }, {
                'tag': 'div',
                'data': {
                    'attrs': {},
                    'on': {}
                },
                'children': [{'text': '0'}]
            }, {
                'tag': 'div',
                'data': {
                    'attrs': {},
                    'on': {}
                },
                'children': [{'text': '1'}]
            }]
        }
    });

    root.mount('#ssr-root');

</script>
