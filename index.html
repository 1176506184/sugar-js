<!DOCTYPE html>
<html lang="en" xmlns:s-use="http://www.w3.org/1999/xhtml" xmlns:s-on="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/packages/sugar/src/css/sugar-css.css">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<style>

    html, body {
        margin: 0;
        padding: 0;
    }

    .title {
        width: 100vw;
        height: 40px;
        background: #4faee8;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bolder;
    }

    .nav {
        margin: 5px 5px 0;
        line-height: 30px;
        font-size: 15px;
    }

    .label {
        margin: 5px;
        font-size: 13px;
    }

</style>
<script src="/dist/sugar.js"></script>
<body>
<div id="app">
    <div class="title">
        SUGAR-JS
    </div>

    <div>
        <button style="margin: 5px 5px 0;" class="sugar-button" @click="updateActive">切换界面:{{active.value}}</button>
    </div>

    <div s-if="active.value === 0">
        <p class="label">计算属性</p>

        <p class="label">{{title.value}}</p>

        <p class="label">外部状态值：{{store.num}}</p>

        <p class="label">s-if</p>

        <p class="label" s-if="state.num % 2 === 0">{{state.num}}</p>

        <p class="label">s-for</p>

        <button class="sugar-button" style="margin: 5px 5px 0;" s-for="(item,index) in state.list" :key="item.d"
                @click="update(item,state.num)">
            {{item.d}}
        </button>

        <button style="margin: 5px 5px 0;" class="sugar-button" @click="pushNode">新增</button>

        <p class="label">s-model</p>

        <input s-model="state.num" class="sugar-input" style="margin: 5px 5px 0;"/>

        <sugar-button @click="pushNode" :dataKey="title.value">
            新增（{{state.num}}）
        </sugar-button>

    </div>

    <div s-if="active.value === 1">

    </div>

</div>

</body>

<script>


    const {
        makeSugar,
        reactive,
        reckon,
        onMounted,
        ref,
        createEffect
    } = SUGAR;

    const store = reactive({
        num: 0
    });

    const button = {
        name: 'sugar-button',
        render: `<button class="sugar-button" style="margin: 5px 5px 0;" @click="click" :dataKey="dataKey.value">
    <slot></slot>
</button>`,
        bulk(ctx) {

            const text = ref(0);

            function click() {
                text.value += 1;
                ctx.click();
            }

            const dataKey = ctx.datakey;

            return {
                click,
                text,
                dataKey
            };
        }
    };

    var sugar = makeSugar({
        bulk() {

            const state = reactive({
                num: 0,
                list: [{d: 1}, {d: 2}, {d: 3}, {d: 4}],
                classText: 'font-size:17px',
                fontSize: 15,
                choose: 1,
                selectList: [{
                    label: '选项一',
                    value: 1
                }, {
                    label: '选项二',
                    value: 2
                }]
            });

            const active = ref(0);

            function pushNode() {
                state.num += 1;
                state.list.push({
                    d: state.list.length + 1
                });
            }

            const title = reckon(() => {
                return state.num + 2;
            });

            const styleText = reckon(() => {
                return `font-size:${state.fontSize}px`;
            });

            onMounted(() => {
                state.num += 1;
            });

            function update(item, num) {
                state.num += 1;
            }

            function changeNum(e) {
                state.num = e.target.value;
            }

            function changeChoose(e) {
                state.choose = e;
            }

            function updateActive() {
                active.value = active.value === 1 ? 0 : 1;
            }

            const testRef = ref('testRef');

            return {
                state,
                update,
                title,
                styleText,
                changeNum,
                changeChoose,
                testRef,
                pushNode,
                active,
                updateActive,
                store
            };
        }
    });

    sugar.install([button]);

    sugar.mount('#app');


</script>
</html>
