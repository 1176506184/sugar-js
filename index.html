<!DOCTYPE html>
<html lang="en" xmlns:s-use="http://www.w3.org/1999/xhtml" xmlns:s-on="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/packages/sugar-ui/src/css/sugar-css.css">
    <script src="/dist/sugar.js"></script>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<style>

    html, body {
        margin: 0;
        padding: 0;
    }

    .title {
        font-size: 23px;
        font-weight: bold;
        line-height: 30px;
        color: #2C2C2C;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .nav {
        width: 100%;
        height: 50px;
        background: #4faee8;
        display: flex;
        position: relative;
        align-items: center;
        top: 0;
        z-index: 999;
    }

    .nav img {
        height: 35px;
    }

    .nav .web_name {
        font-size: 22px;
        font-weight: 400;
        color: #FFFFFF;
        width: calc(40% - 20px);
        padding-left: 20px;
        height: 100%;
        text-align: center;
        display: flex;
        justify-content: left;
        align-items: center;
    }

    .article_body {
        width: 96%;
        margin: 0 auto;
        padding-top: 10px;
    }

    .item {
        padding-top: 10px;
        width: 92%;
        margin-left: 4%;
        padding-bottom: 10px;
        display: block;
        position: relative;
        border-bottom: 1px solid #eee;
    }


    .label_box {
        font-size: 15px;
        font-weight: 400;
        line-height: 21px;
        color: #2C2C2C;
        margin-top: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        letter-spacing: 1px;
    }


    .image_box {
        width: 92vw;
        height: 48vw;
        position: relative;
    }

    .image_box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .menu {
        position: absolute;
        right: 10px;
        width: 18px;
    }

    .menu_fixed_box {
        width: 100%;
        top: 0;
        height: 50vh;
        background-color: #fff;
        position: absolute;
        transition: 0.3s;
    }

</style>
<body>
<div id="app">
    <div class="nav">
        <div class="web_name">
            <img src="//store.44finefood.com/logo/2022-04-27/306EFED3C8A8.png" class="headling_logo" alt="">
        </div>
        <img src="https://666.44finefood.com/Content/images/menu.svg" class="menu" @click="open" alt=""/>
    </div>

    <sugar-pagination :pi="state.pi" :ps="state.ps" :total="state.total" @change="changePage"></sugar-pagination>

    <div class="article_body" s-loading="loading">
        <div class="title">
            {{state.title}}
        </div>
        <div class="content" s-html="state.content">
        </div>
    </div>

    <div class="article_join">
        <div class="item" s-for="(item,index) in list" :style="index === (list.length - 1) ? 'border:0' : ''">
            <div class="image_box">
                <sugar-image :src="item.cover" @click="showImage(item)" alt=""></sugar-image>
            </div>
            <div class="label_box">
                {{item.title}}
            </div>
        </div>
    </div>

    <sugar-dialog :model="active" @close="close">
        <div class="menu_fixed_box" :style="'top:' + top + 'vh'">
            <div s-for="(item,index) in cateList"
                 style="border: 1px solid #666;border-radius: 3px;font-size: 13px;color:#666;text-align: center;line-height: 28px;margin: 10px;width: 80px;height: 28px;float: left">
                {{item}}
            </div>
        </div>
    </sugar-dialog>

    <sugar-dialog :model="showImageActive" @close="closeImage" :instance="htmlRef">
        <img :src="popImage" style="width: 100%;height: auto"/>
    </sugar-dialog>

</div>


</body>

<script>
    const {
        makeSugar,
        onMounted,
        instance,
        useState,
        useEffect,
        nextTick,
        SUGAR_UI
    } = SUGAR;

    var sugar = makeSugar({
        bulk() {

            const [state, setState] = useState({
                total:100,
                pi: 1,
                ps: 20,
                name: 0,
                title: '狗狗因為太害怕人類，被安排于兩天后安樂死，幸好她出現了..',
                content: `<p>自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業<span id="vft" data-wordc="231"></span></p><p style="font-weight: 600; color: #CC6633;font-size:15px !important ">
                版權所有，禁止轉載。 違者必究法律責任。
            </p>`
            });

            function changePage(v){
                setState({
                    ...state.value,
                    pi: v
                });
            }

            const [cateList, setCateList] = useState(['娱乐', '新闻']);

            const [list, setList] = useState([{
                title: '你要悄悄的變好，然後驚豔所有人：真正厲害的人，會懂得「蘑菇定律」！',
                cover: 'https://fastly.picsum.photos/id/1044/200/200.jpg?hmac=HB3e6tTss6J_9wexZ1v1psMlccdyQIrHrrijUgWXFhg'
            }, {
                title: '#耽美 釣系yyds！汪嘰的雅正徹底離家出走了',
                cover: 'https://picsum.photos/200/200?random=1'
            }, {
                title: '#耽美 釣系yyds！汪嘰的雅正徹底離家出走了',
                cover: 'https://picsum.photos/300/200?random=2'
            }]);

            const [active, setActive] = useState(false);

            const htmlRef = instance(null);

            const [showImageActive, setShowImageActive] = useState(false);

            const [popImage, setPopImage] = useState('');

            const [top, setTop] = useState(-50);

            const [loading, setLoading] = useState(false);

            const [show, setShow] = useState(false);

            function close() {
                setTop(-50);
                setActive(false);
            }

            function open() {
                setActive(true);
                setTimeout(() => {
                    setTop(0);
                }, 200);
            }

            function closeImage() {
                setShowImageActive(false);
            }

            function showImage(item) {
                setPopImage(item.cover);
                setShowImageActive(true);
            }

            onMounted(() => {

            });

            useEffect(() => {
                console.log(showImageActive.value);
            }, [showImageActive]);

            return {
                state,
                active,
                list,
                close,
                open,
                htmlRef,
                showImageActive,
                closeImage,
                popImage,
                showImage,
                top,
                cateList,
                loading,
                setLoading,
                show,
                setShow,
                changePage
            };
        }
    });
    sugar.install(SUGAR_UI);
    sugar.mount('#app');
</script>
</html>
