<!DOCTYPE html>
<html lang="en" xmlns:s-use="http://www.w3.org/1999/xhtml" xmlns:s-on="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/packages/sugar/src/css/sugar-css.css">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<style>

    html, body {
        margin: 0;
        padding: 0;
    }

    .title {
        font-size: 23px;
        font-weight: bold;
        line-height: 30px;
        color: #2C2C2C;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .nav {
        width: 100%;
        height: 50px;
        background: #4faee8;
        display: flex;
        position: relative;
        align-items: center;
        top: 0;
        z-index: 999;
    }

    .nav img {
        height: 35px;
    }

    .nav .web_name {
        font-size: 22px;
        font-weight: 400;
        color: #FFFFFF;
        width: calc(40% - 20px);
        padding-left: 20px;
        height: 100%;
        text-align: center;
        display: flex;
        justify-content: left;
        align-items: center;
    }

    .article_body {
        width: 96%;
        margin: 0 auto;
        padding-top: 10px;
    }

    .item {
        padding-top: 10px;
        width: 92%;
        margin-left: 4%;
        padding-bottom: 10px;
        display: block;
        position: relative;
        border-bottom: 1px solid #eee;
    }


    .label_box {
        font-size: 15px;
        font-weight: 400;
        line-height: 21px;
        color: #2C2C2C;
        margin-top: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        letter-spacing: 1px;
    }


    .image_box {
        width: 92vw;
        height: 48vw;
        position: relative;
    }

    .image_box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .menu {
        position: absolute;
        right: 10px;
        width: 18px;
    }

    .menu_fixed_box {
        width: 100%;
        top: 0;
        height: 50vh;
        background-color: #fff;
        position: absolute;
        transition: 0.3s;
    }

</style>
<script src="/dist/sugar.js"></script>
<body>
<div id="app">

    <div class="nav">
        <div class="web_name">
            <img src="//store.44finefood.com/logo/2022-04-27/306EFED3C8A8.png" class="headling_logo" alt="">
        </div>
        <img src="https://666.44finefood.com/Content/images/menu.svg" class="menu" @click="open" alt=""/>
    </div>

    <div class="article_body">
        <div class="title">
            {{state.title}}
        </div>
        <div class="content" s-html="state.content" ref="htmlRef">
        </div>
    </div>

    <div class="article_join">
        <div class="item" s-for="(item,index) in list" :style="index === (list.length - 1) ? 'border:0' : ''">
            <div class="image_box">
                <img :src="item.cover" @click="showImage(item)"/>
            </div>
            <div class="label_box">
                {{item.title}}
            </div>
        </div>
    </div>

    <sugar-dialog :model="active" @close="close" :instance="htmlRef">
        <div class="menu_fixed_box" :style="'top:' + top + 'vh'">

        </div>
    </sugar-dialog>

    <sugar-dialog :model="showImageActive" @close="closeImage">
        <img :src="popImage" style="width: 100%;height: auto"/>
    </sugar-dialog>

</div>

</body>

<script>


    const {
        makeSugar,
        onMounted,
        ref,
        instance,
        sugarUI,
        useState,
        useEffect,
        nextTick
    } = SUGAR;

    var sugar = makeSugar({
        bulk() {

            const [state, setState] = useState({
                name: 0,
                title: '狗狗因為太害怕人類，被安排于兩天后安樂死，幸好她出現了..',
                content: `<p>自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業自曝遭富婆大額打賞！TVB知名男星內地連續直播12小時！被贊太敬業<span id="vft" data-wordc="231"></span></p><p style="font-weight: 600; color: #CC6633;font-size:15px !important ">
                版權所有，禁止轉載。 違者必究法律責任。
            </p>`
            });

            const [list, setList] = useState([{
                title: '你要悄悄的變好，然後驚豔所有人：真正厲害的人，會懂得「蘑菇定律」！',
                cover: '//cdn.supertime01.com/thumb.ashx?path=%2fdpxs%2f20240520%2f2DA622C0761Ew800h1200.Jpeg&width=150&height=200'
            }, {
                title: '#耽美 釣系yyds！汪嘰的雅正徹底離家出走了',
                cover: '//cdn.sweetastes.com/thumb.ashx?path=%2fdpxs%2f20221007%2f6F15A9339A07w300h400.Jpeg&width=150&height=200'
            }]);

            const [active, setActive] = useState(false);

            const htmlRef = instance(null);

            const [showImageActive, setShowImageActive] = useState(false);

            const [popImage, setPopImage] = useState('');

            const [top, setTop] = useState(-50);

            function close() {
                setTop(-50);
                setActive(false);
            }

            function open() {
                setActive(true);
                setTimeout(()=>{
                    setTop(0);
                },100)
            }

            function closeImage() {
                setShowImageActive(false);
            }

            function showImage(item) {
                setPopImage(item.cover);
                setShowImageActive(true);
            }

            onMounted(() => {

            });

            useEffect(() => {

            }, [active]);

            return {
                state,
                active,
                list,
                close,
                open,
                htmlRef,
                showImageActive,
                closeImage,
                popImage,
                showImage,
                top
            };
        }
    });

    sugar.install(sugarUI);

    sugar.mount('#app');


</script>
</html>
