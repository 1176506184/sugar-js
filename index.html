<!DOCTYPE html>
<html lang="en" xmlns:s-use="http://www.w3.org/1999/xhtml" xmlns:s-on="http://www.w3.org/1999/xhtml" xmlns="">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/dist/sugar.css">
    <script src="/dist/sugar.js"></script>
    <script src="dist/sugar-ui.js"></script>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
</head>
<style>

    html, body {
        margin: 0;
        padding: 0;
    }

    .title {
        font-size: 23px;
        font-weight: bold;
        line-height: 30px;
        color: #2C2C2C;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .nav {
        width: 100%;
        height: 50px;
        background: #4faee8;
        display: flex;
        position: relative;
        align-items: center;
        top: 0;
        z-index: 999;
    }

    .nav img {
        height: 35px;
    }

    .nav .web_name {
        font-size: 22px;
        font-weight: 400;
        color: #FFFFFF;
        width: calc(40% - 20px);
        padding-left: 20px;
        height: 100%;
        text-align: center;
        display: flex;
        justify-content: left;
        align-items: center;
    }

    .article_body {
        width: 96%;
        margin: 0 auto;
        padding-top: 10px;
    }

    .item {
        padding-top: 10px;
        width: 92%;
        margin-left: 4%;
        padding-bottom: 10px;
        display: block;
        position: relative;
        border-bottom: 1px solid #eee;
    }


    .label_box {
        font-size: 15px;
        font-weight: 400;
        line-height: 21px;
        color: #2C2C2C;
        margin-top: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        letter-spacing: 1px;
    }


    .image_box {
        width: 92vw;
        height: 48vw;
        position: relative;
        overflow: hidden;
    }

    .image_box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .menu {
        position: absolute;
        right: 10px;
        width: 18px;
    }

    .menu_fixed_box {
        width: 100%;
        top: 0;
        height: 50vh;
        background-color: #fff;
        position: absolute;
        transition: 0.3s;
    }

</style>
<body>
<div id="app">



    <div class="nav">
        <div class="web_name">
            <img src="//store.44finefood.com/logo/2022-04-27/306EFED3C8A8.png" class="headling_logo" alt="">
        </div>
        <img src="https://666.44finefood.com/Content/images/menu.svg" class="menu" @click="open" alt=""/>
    </div>

    <sugar-percentage instance="ttRef" id="per_1" sugar-wh="400,300"
                      background="https://fastly.picsum.photos/id/1044/200/200.jpg?hmac=HB3e6tTss6J_9wexZ1v1psMlccdyQIrHrrijUgWXFhg">
        <div instance="testRef" sugar-wh="300,100" sugar-tb="10,10" sugar-id="1"
             :style="perS.p1 + ';margin-left:50%;transform: translateX(-50%);background:#fff'">
            测试啊啊啊
        </div>
        <div sugar-wh="300,50" sugar-tb="10,10" sugar-id="2"
             :style="perS.p2 + ';margin-left:50%;transform: translateX(-50%);background:#333'">
        </div>
    </sugar-percentage>

    <input @input="setTextModel" :value="textModel" placeholder="test"/>
    <input type="file" @change="fileChange"/>

    <div s-for="(item,index) in list" s-if="showFile">
        <sugar-upload @change="fileChange(item,index)" :key="'file'+index">
            <sugar-button>上传</sugar-button>
        </sugar-upload>
    </div>

    <sugar-back-top></sugar-back-top>

    <div s-if="false"></div>

    <sugar-swiper>
        <sugar-swiper-item s-for="(item,index) in list">
            <div style="height: 100px;display: flex;align-items: center;justify-content: center">
                {{index + 1}}
            </div>
        </sugar-swiper-item>
    </sugar-swiper>

    <sugar-text style="margin:20px" rows="3" arrow="true">{{text}}</sugar-text>

    <sugar-pagination
            :pi="pi"
            :ps="ps"
            :total="total"
            page="2"
            style="margin-top: 10px"
            @change="changePage"
            :btn="true"
            :show-most="true">
    </sugar-pagination>

    <div class="article_body" s-loading="loading">
        <div class="title" instance="htmlRef">
            {{state.title}}
        </div>
        <div class="content" s-html="state.content" style="font-size: 13px">
        </div>
    </div>

    <div class="article_join">
        <div class="item" s-for="(item,index) in list" :style="index === (list.length - 1) ? 'border:0' : ''">
            <div class="image_box">
                <sugar-lazy>
                    <img :src="item.cover" @click="showImage(item)" alt="" @error="imageError"/>
                </sugar-lazy>
            </div>
            <div class="label_box">
                {{item.title}}
            </div>
        </div>
    </div>

    <sugar-dialog :model="active" @close="close" direction="top">
        <div class="menu_fixed_box">
            <div s-for="(item,index) in cateList"
                 style="border: 1px solid #666;border-radius: 3px;font-size: 13px;color:#666;text-align: center;line-height: 28px;margin: 10px;width: 80px;height: 28px;float: left">
                {{item}}
            </div>
        </div>
    </sugar-dialog>

    <sugar-dialog :model="showImageActive" @close="closeImage" instance="dialog">
        <img :src="popImage" style="width: 100%;height: auto"/>
    </sugar-dialog>
</div>
</body>

    sugar.install(sugarUI);

</html>
